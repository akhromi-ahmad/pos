# ============================================================
#  GitHub Actions — Auto Merge → Deploy to VPS
#  File location: .github/workflows/deploy.yml
# ============================================================

name: Auto Merge & Deploy to VPS

on:
  pull_request:
    branches:
      - dev          # Trigger when a PR targets the dev branch
    types:
      - opened
      - synchronize  # Re-run when new commits are pushed to the PR
      - reopened

jobs:

  # ──────────────────────────────────────────
  #  JOB 1: Check for conflicts & auto merge into dev
  # ──────────────────────────────────────────
  auto-merge:
    name: Check & Auto Merge to Dev
    runs-on: ubuntu-latest

    outputs:
      merged: ${{ steps.merge.outputs.merged }}  # Pass merge status to deploy job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for conflict detection
          token: ${{ secrets.GH_TOKEN }}  # Token with write permission

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for merge conflicts
        id: conflict-check
        run: |
          git fetch origin dev
          git checkout dev

          # Simulate merge to detect conflicts (dry run — no actual commit)
          git merge --no-commit --no-ff origin/${{ github.head_ref }} 2>&1
          MERGE_STATUS=$?

          if [ $MERGE_STATUS -ne 0 ]; then
            echo "has_conflict=true" >> $GITHUB_OUTPUT
            git merge --abort
            echo "❌ Conflict detected. Merge aborted."
          else
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            git merge --abort  # Abort dry run; real merge happens in the next step
            echo "✅ No conflicts found."
          fi

      - name: Fail if conflicts exist
        if: steps.conflict-check.outputs.has_conflict == 'true'
        run: |
          echo "::error::❌ This PR has conflicts with the dev branch. Please resolve them before merging."
          exit 1

      - name: Auto merge into dev
        id: merge
        if: steps.conflict-check.outputs.has_conflict == 'false'
        run: |
          git checkout dev
          git merge --no-ff origin/${{ github.head_ref }} -m "Auto merge: ${{ github.head_ref }} → dev [skip ci]"
          git push origin dev
          echo "merged=true" >> $GITHUB_OUTPUT
          echo "✅ Successfully merged into dev."

      - name: Post comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const hasConflict = '${{ steps.conflict-check.outputs.has_conflict }}' === 'true';
            const body = hasConflict
              ? '❌ **Auto Merge Failed** — This PR has conflicts with the `dev` branch.\n\nPlease resolve the conflicts manually and push again.'
              : '✅ **Auto Merge Successful** — This PR has been merged into `dev` and deployment to VPS is now in progress.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });


  # ──────────────────────────────────────────
  #  JOB 2: Deploy to VPS (only runs if merge succeeded)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: auto-merge                                # Only runs after auto-merge completes
    if: needs.auto-merge.outputs.merged == 'true'   # Only runs if merge was successful

    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}       # VPS IP address or domain
          username: ${{ secrets.VPS_USER }}       # SSH username (e.g. ubuntu / root)
          key:      ${{ secrets.VPS_SSH_KEY }}    # SSH private key
          port:     ${{ secrets.VPS_PORT || 22 }} # SSH port (default: 22)
          script: |
            echo "🚀 Starting deployment..."

            # Navigate to project directory on VPS
            cd ${{ secrets.VPS_PROJECT_PATH }}    # e.g. /var/www/pos

            # Pull the latest code from dev branch
            git fetch origin dev
            git checkout dev
            git pull origin dev

            # Install / update PHP dependencies
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            # Run any pending database migrations
            php artisan migrate --force

            # Clear and rebuild config, route, and view caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart queue workers if applicable
            # php artisan queue:restart

            # Fix storage and cache directory permissions
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache

            echo "✅ Deployment complete!"

      - name: Notify deployment success
        if: success()
        run: echo "✅ Successfully deployed to VPS at $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'dev',
              per_page: 1
            });
            if (prs.length > 0) {
              github.rest.issues.createComment({
                issue_number: prs[0].number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '❌ **Deployment Failed** — The merge succeeded but deployment to VPS encountered an error. Check the Actions tab for details.'
              });
            }
